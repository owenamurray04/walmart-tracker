name: Walmart store availability

# Runs weekly and commits the results back to the repo.
on:
  schedule:
    - cron: "0 13 * * 1"      # every Monday 13:00 UTC (~9am ET)
  workflow_dispatch: {}        # lets you run it manually from the Actions tab

permissions:
  contents: write              # needed to commit results back

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install patchright
      - run: python -m patchright install --with-deps chrome
      - run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run availability check
        env:
          DI_PROXY: ${{ secrets.DI_PROXY }}            # DataImpulse endpoint
        run: |
          xvfb-run --auto-servernum python -u walmart_store_check.py --seeds sample_zips.csv --delay 0.2

      - name: Commit results
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add store_products.csv product_summary.csv state_summary.csv line_coverage.csv history.csv
          git commit -m "weekly availability $(date -u +%Y-%m-%d)" || { echo "no changes"; exit 0; }
          # pull anything that landed while we were crawling, then push (retry a few times)
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push origin HEAD:main && exit 0
            echo "push attempt $i failed, retrying…"; sleep 5
          done
          echo "could not push after retries"; exit 1
