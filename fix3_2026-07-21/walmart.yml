name: "1 · Weekly product check — the main scraper (~$10/run)"

# Checks every product across every store in the map, via Bright Data Web
# Unlocker (plain HTTP — runs fine on cloud runners, no browser needed).
#
# PROBE-GATED MODE (2026-07-21): the Web Unlocker throttles this Walmart
# pattern adaptively (reputation-based, per BD support) — hammering a
# degraded pattern keeps it degraded. So every scheduled firing:
#   1. probes: ~10 min of single-file calls at a 5s pace (~25-70 attempts)
#   2. still throttled -> exits immediately; tries again next firing
#   3. healthy -> ramps to full speed and runs the real sweep
# The cron fires every 6h Mon–Wed (UTC), runs resume the checkpoint, and
# the fresh-window guard makes post-completion firings free no-ops — so
# the week's sweep publishes the moment Bright Data recovers, and while
# they're broken the total pressure is ~100 gentle attempts per firing.
# An incomplete sweep NEVER overwrites the dashboard. A red X on a
# scheduled run just means "probe failed, still throttled".
# Manual runs from the Actions tab skip the probe and the fresh-window
# guard, and can override budget / products / workers / gap.
#
# Requires one repo secret: BRD_PROXY (Settings → Secrets → Actions):
#   http://brd-customer-XXX-zone-walmart_unlocker:PASS@brd.superproxy.io:33335
#
# Store-map refreshes (new/closed stores) are separate and cheap — run
# gapfill_stores.py locally every month or two.

on:
  # Turtle autopilot: Mon–Wed every 6h UTC; the fresh-window guard makes the
  # firings after a completed sweep free no-ops. Comment out to go manual.
  schedule:
    - cron: "0 */6 * * 1-3"
  workflow_dispatch:
    inputs:
      budget:
        description: "Max billed calls (1000 = $1.50)"
        default: "7500"
      products:
        description: "Product list CSV (products_instore.csv = the 11 shelved colorways; products.csv = all 18 incl. online-only)"
        default: "products_instore.csv"
      workers:
        description: "Parallel workers (lower = gentler on rate limits)"
        default: "8"
      gap:
        description: "Base seconds between request launches (raise if throttled)"
        default: "0.35"

permissions:
  contents: write

# One sweep at a time: a firing that overlaps a still-running job queues
# behind it instead of colliding with its checkpoint commits.
concurrency:
  group: walmart-sweep
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Self-host the map geometry (one-time; keeps dashboard CDN-free)
        run: |
          if [ ! -f states-10m.json ]; then
            curl -fsSL -o states-10m.json https://cdn.jsdelivr.net/npm/us-atlas@3/states-albers-10m.json \
              || rm -f states-10m.json
          fi

      - name: Sweep all products across all stores (resumes checkpoint if present)
        env:
          BRD_PROXY: ${{ secrets.BRD_PROXY }}
        run: |
          python -u weekly_check.py \
            --budget   "${{ github.event.inputs.budget   || '7500' }}" \
            --products "${{ github.event.inputs.products || 'products_instore.csv' }}" \
            --workers  "${{ github.event.inputs.workers  || '8' }}" \
            --gap      "${{ github.event.inputs.gap      || '0.35' }}" \
            --fresh-window  "${{ github.event_name == 'schedule' && '72' || '0' }}" \
            --probe-minutes "${{ github.event_name == 'schedule' && '10' || '0' }}"

      - name: Commit results (even on failure/timeout, to save the checkpoint)
        if: always()
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "availability $(date -u '+%Y-%m-%d %H:%M')" || exit 0
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push origin HEAD:main && exit 0
            sleep 5
          done
          exit 1
